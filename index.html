      </GradHeader>}

      {/* Season ribbon */}
      <div style={{display:"flex",gap:6,marginBottom:16}}>{season?.map(w=>{const g=myR.has(w.week);const cur=cw?.week===w.week;return<button key={w.week} style={{flex:1,padding:"12px 0",borderRadius:12,background:cur?C.greenPale:g?C.greenPale+"80":C.white,border:`2px solid ${cur?C.green:g?C.greenPale:C.border}`,textAlign:"center",opacity:w.past&&!g?.4:1}} onClick={()=>setOpenWk(openWk===w.week?null:w.week)}><div style={{fontSize:13,fontWeight:cur?800:600,color:cur?C.green:g?C.greenLight:C.muted}}>{w.week}</div>{g&&<div style={{width:5,height:5,borderRadius:3,background:C.green,margin:"3px auto 0"}}/>}</button>;})}</div>
      {openWk&&<div style={{background:C.greenPale,borderRadius:18,padding:"20px",marginBottom:16,animation:"popIn .3s ease"}}><div style={{fontSize:12,fontWeight:800,color:C.green,textTransform:"uppercase",letterSpacing:"1px",marginBottom:6}}>Week {openWk} · {RITUALS[openWk-1]?.t}</div><div style={{fontSize:14,color:C.text,lineHeight:1.6}}>{RITUALS[openWk-1]?.p}</div></div>}

      {/* Ritual + buddy */}
      {ritual&&<div style={{background:C.brownPale,borderRadius:18,padding:"20px",marginBottom:16}}><div style={{fontSize:12,fontWeight:800,color:C.brown,textTransform:"uppercase",letterSpacing:"1px",marginBottom:6}}>🕯️ Week {ritual.w} ritual</div><div style={{fontSize:15,color:C.ink,lineHeight:1.6,fontStyle:"italic"}}>{ritual.p}</div></div>}
      {buddy&&<div style={{background:C.purplePale,borderRadius:18,padding:"16px 20px",marginBottom:16,display:"flex",alignItems:"center",gap:14}}><Avatar name={buddy.name} size={40}/><div><div style={{fontSize:12,fontWeight:800,color:C.purple,textTransform:"uppercase",letterSpacing:"1px"}}>☕ Coffee buddy</div><div style={{fontSize:15,fontWeight:600,color:C.ink}}>{buddy.name}</div></div></div>}

      {/* Circle */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:"1px",marginBottom:12}}>Your circle · {mc.name} {mc.number}</div>
        <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:4}}>
          <div style={{textAlign:"center",flexShrink:0}}><Avatar name={me.name} size={48} me/><div style={{fontSize:11,fontWeight:700,color:C.green,marginTop:4}}>You</div></div>
          {members.map(m=><div key={m.id} style={{textAlign:"center",flexShrink:0,cursor:"pointer"}} onClick={()=>setOpenMem(openMem===m.id?null:m.id)}><Avatar name={m.name} size={48}/><div style={{fontSize:11,fontWeight:600,color:C.text,marginTop:4}}>{m.name}</div></div>)}
        </div>
        {openMem&&members.find(m=>m.id===openMem)&&(()=>{const m=members.find(x=>x.id===openMem);return<div style={{background:C.white,borderRadius:18,padding:"20px",marginTop:12,border:`2px solid ${C.border}`,animation:"popIn .3s ease"}}><div style={{fontSize:16,fontWeight:800,color:C.ink}}>{m.name}{m.age&&`, ${m.age}`}</div>{m.bio&&<div style={{fontSize:14,color:C.text,lineHeight:1.6,marginTop:6}}>{m.bio}</div>}{m.life_stage&&<div style={{fontSize:13,color:C.green,marginTop:6}}>{STAGES.find(x=>x.id===m.life_stage)?.e} {STAGES.find(x=>x.id===m.life_stage)?.l}</div>}{(m.prompts||[]).filter(p=>p.a).map((p,j)=><div key={j} style={{marginTop:10}}><div style={{fontSize:12,color:C.muted,fontWeight:600}}>{p.q}</div><div style={{fontSize:14,color:C.ink,marginTop:2}}>{p.a}</div></div>)}<div style={{fontSize:12,color:C.muted,marginTop:8}}>{(m.interests||[]).join(" · ")}</div>{(m.instagram||m.beli)&&<div style={{display:"flex",gap:12,marginTop:8}}>{m.instagram&&<a href={`https://instagram.com/${m.instagram.replace("@","")}`} target="_blank">@{m.instagram.replace("@","")}</a>}{m.beli&&<a href={`https://bfrnd.link/${m.beli}`} target="_blank">Beli</a>}</div>}</div>;})()}
      </div>

      {/* Recent posts */}
      {posts.length>0&&<div style={{marginBottom:16}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><span style={{fontSize:13,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:"1px"}}>Recent</span><button style={{fontSize:13,fontWeight:700,color:C.green}} onClick={()=>{setTab("feed");go("circle");}}>See all</button></div>
        {posts.slice(0,2).map(p=><div key={p.id} style={{background:C.white,borderRadius:16,padding:"16px",border:`2px solid ${C.border}`,marginBottom:8}}><div style={{fontSize:12,fontWeight:700,color:C.muted}}>{p.user_name} · {ago(p.created_at)}</div><div style={{fontSize:14,color:C.ink,lineHeight:1.6,marginTop:4}}>{p.content}</div></div>)}
      </div>}

      {/* Stats */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>{[{l:"Season",v:mc.season||1,bg:C.greenPale,c:C.green},{l:"Rate",v:Math.round(myR.size/Math.max(1,season?.filter(w=>w.past).length||1)*100)+"%",bg:C.brownPale,c:C.brown},{l:"Memories",v:memos.length,bg:C.purplePale,c:C.purple}].map((x,i)=><div key={i} style={{flex:1,background:x.bg,borderRadius:16,padding:"16px 12px",textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,color:x.c}}>{x.v}</div><div style={{fontSize:11,fontWeight:700,color:x.c,opacity:.7,marginTop:2}}>{x.l}</div></div>)}</div>
      <div style={{display:"flex",gap:8}}><button style={{flex:1,fontSize:14,fontWeight:700,padding:"14px",borderRadius:100,border:`2px solid ${C.border}`,background:C.white,color:C.ink}} onClick={share}>Invite 📤</button><button style={{flex:1,fontSize:14,fontWeight:700,padding:"14px",borderRadius:100,border:`2px solid ${C.border}`,background:C.white,color:C.ink}} onClick={()=>go("explore")}>Explore 🗺️</button></div>
    </>:<>
      <div className="pop"><div style={{fontSize:48,marginBottom:12}}>👋</div><h2 style={{fontSize:28,fontWeight:800,color:C.ink,marginBottom:8}}>Hey, {me.name}!</h2><p style={{fontSize:15,color:C.muted,lineHeight:1.6,marginBottom:24}}>Waitlisted for <strong style={{color:C.ink}}>{me.neighborhood}</strong>. Need 2+ people.</p>
        <GradHeader gradient={C.grad2} style={{marginBottom:24}}><div style={{display:"flex",justifyContent:"space-around"}}><div style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800}}>{hoodWait.length+1}</div><div style={{fontSize:12,opacity:.8}}>In area</div></div><div style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800}}>2</div><div style={{fontSize:12,opacity:.8}}>Needed</div></div></div></GradHeader>
        <div style={{display:"flex",gap:8}}><button style={{flex:1,fontSize:14,fontWeight:700,padding:"14px",borderRadius:100,border:`2px solid ${C.border}`,color:C.ink}} onClick={share}>Share 📤</button><button style={{flex:1,fontSize:14,fontWeight:800,padding:"14px",borderRadius:100,background:C.green,color:"#fff"}} onClick={refresh}>Check</button></div>
      </div>
    </>}
    <Nav/>
  </div>}

  {/* ═══ CIRCLE ═══ */}
  {scr==="circle"&&me&&mc&&<div style={pg}>
    <div style={{fontSize:13,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:"1px",marginBottom:16}}>Circle {mc.name}</div>
    <div style={{display:"flex",marginBottom:24,background:C.white,borderRadius:100,border:`2px solid ${C.border}`,overflow:"hidden"}}>{[["feed","Feed"],["memories","Memories"]].map(([k,l])=><button key={k} style={{flex:1,padding:"12px 0",fontSize:14,fontWeight:tab===k?800:500,color:tab===k?C.green:C.muted,background:tab===k?C.greenPale:"transparent"}} onClick={()=>setTab(k)}>{l}</button>)}</div>
    {tab==="feed"&&<div>
      <div style={{background:C.white,borderRadius:18,padding:"16px",border:`2px solid ${C.border}`,marginBottom:20}}><textarea style={{minHeight:56,marginBottom:8}} value={newPost} onChange={e=>setNewPost(e.target.value)} placeholder="Share something..."/><div style={{display:"flex",justifyContent:"flex-end"}}><button style={{fontSize:13,fontWeight:800,padding:"10px 24px",borderRadius:100,background:C.green,color:"#fff",...(!newPost.trim()?{opacity:.3}:{})}} onClick={doPost}>Post</button></div></div>
      {posts.map(p=><div key={p.id} style={{background:C.white,borderRadius:16,padding:"16px",border:`2px solid ${C.border}`,marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><Avatar name={p.user_name} size={28}/><span style={{fontSize:13,fontWeight:700,color:C.ink}}>{p.user_name}</span><span style={{fontSize:12,color:C.muted}}>{ago(p.created_at)}</span></div><div style={{fontSize:14,color:C.ink,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{p.content}</div></div>)}
      {posts.length===0&&<div style={{padding:48,textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>🌱</div><div style={{fontSize:16,fontWeight:700,color:C.ink,marginBottom:4}}>Nothing here yet</div><div style={{fontSize:14,color:C.muted}}>Be the first to share something with your circle</div></div>}
    </div>}
    {tab==="memories"&&<div>
      <div style={{background:C.white,borderRadius:18,padding:"16px",border:`2px solid ${C.border}`,marginBottom:20}}><textarea style={{minHeight:56,marginBottom:8}} value={memInput} onChange={e=>setMemInput(e.target.value)} placeholder="A quote, a moment, an inside joke..."/><div style={{display:"flex",justifyContent:"flex-end"}}><button style={{fontSize:13,fontWeight:800,padding:"10px 24px",borderRadius:100,background:C.brown,color:"#fff",...(!memInput.trim()?{opacity:.3}:{})}} onClick={doMem}>Save</button></div></div>
      {memos.map(m=><div key={m.id} style={{background:C.brownPale,borderRadius:16,padding:"16px",marginBottom:8}}><div style={{fontSize:12,fontWeight:700,color:C.brown}}>Week {m.week} · {m.user_name}</div><div style={{fontSize:15,color:C.ink,lineHeight:1.6,fontStyle:"italic",marginTop:4}}>"{m.content}"</div></div>)}
      {memos.length===0&&<div style={{padding:48,textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>✨</div><div style={{fontSize:16,fontWeight:700,color:C.ink,marginBottom:4}}>No memories yet</div><div style={{fontSize:14,color:C.muted}}>After your first night together, capture what mattered</div></div>}
    </div>}
    <Nav/>
  </div>}

  {/* ═══ RITUALS ═══ */}
  {scr==="ritual"&&me&&mc&&<div style={pg}>
    <h2 style={{fontSize:24,fontWeight:800,color:C.ink,marginBottom:20}}>Rituals 🕯️</h2>
    {RITUALS.map((r,i)=>{const done=season&&season[i]?.past;const cur=cw?.week===r.w;const going=myR.has(r.w);
      return<div key={i} style={{background:cur?C.greenPale:C.white,borderRadius:18,padding:"18px 20px",border:`2px solid ${cur?C.green:C.border}`,marginBottom:10,opacity:done&&!cur?.5:1}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:800,color:cur?C.green:C.muted,textTransform:"uppercase",letterSpacing:"1px"}}>Week {r.w}{cur?" · Now":""}</div><div style={{fontSize:16,fontWeight:700,color:C.ink,marginTop:4}}>{r.t}</div><div style={{fontSize:14,color:C.text,lineHeight:1.6,marginTop:4,fontStyle:"italic"}}>{r.p}</div></div>
          {season&&!season[i]?.past&&<button style={{fontSize:12,fontWeight:800,padding:"8px 18px",borderRadius:100,background:going?C.green:C.white,color:going?"#fff":C.green,border:`2px solid ${C.green}`,flexShrink:0,marginLeft:12}} onClick={()=>doRsvp(r.w)}>{going?"Going ✓":"RSVP"}</button>}
        </div>
      </div>;
    })}
    <Nav/>
  </div>}

  {/* ═══ ASK/OFFER ═══ */}
  {scr==="ask"&&me&&mc&&<div style={pg}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h2 style={{fontSize:24,fontWeight:800,color:C.ink}}>Ask & Offer 🤝</h2><button style={{fontSize:13,fontWeight:800,padding:"10px 20px",borderRadius:100,background:C.green,color:"#fff"}} onClick={()=>setShowAsk(!showAsk)}>{showAsk?"Cancel":"+ New"}</button></div>
    {showAsk&&<div style={{background:C.white,borderRadius:18,padding:"20px",border:`2px solid ${C.border}`,marginBottom:20,animation:"popIn .3s ease"}}>
      <div style={{display:"flex",gap:8,marginBottom:16}}><button style={{flex:1,padding:"12px",borderRadius:100,fontSize:14,fontWeight:askForm.ask_type==="need"?800:500,background:askForm.ask_type==="need"?C.coralPale:C.white,color:askForm.ask_type==="need"?C.coral:C.muted,border:`2px solid ${askForm.ask_type==="need"?C.coral:C.border}`}} onClick={()=>setAskForm(f=>({...f,ask_type:"need"}))}>I need...</button><button style={{flex:1,padding:"12px",borderRadius:100,fontSize:14,fontWeight:askForm.ask_type==="offer"?800:500,background:askForm.ask_type==="offer"?C.greenPale:C.white,color:askForm.ask_type==="offer"?C.green:C.muted,border:`2px solid ${askForm.ask_type==="offer"?C.green:C.border}`}} onClick={()=>setAskForm(f=>({...f,ask_type:"offer"}))}>I can help...</button></div>
      <select style={{marginBottom:12}} value={askForm.category} onChange={e=>setAskForm(f=>({...f,category:e.target.value}))}>{ASK_CATS.map(c=><option key={c} value={c}>{c}</option>)}</select>
      <textarea style={{minHeight:64,marginBottom:12}} value={askForm.content} onChange={e=>setAskForm(f=>({...f,content:e.target.value}))} placeholder={askForm.ask_type==="need"?"What do you need?":"What can you offer?"}/>
      <button style={{fontSize:14,fontWeight:800,padding:"14px",borderRadius:100,background:C.green,color:"#fff",width:"100%",...(!askForm.content.trim()?{opacity:.3}:{})}} onClick={doAsk}>Post</button>
    </div>}
    {asks.filter(a=>!a.resolved).map(a=><div key={a.id} style={{background:a.ask_type==="need"?C.coralPale:C.greenPale,borderRadius:16,padding:"16px",marginBottom:8}}><div style={{fontSize:12,fontWeight:800,color:a.ask_type==="need"?C.coral:C.green,textTransform:"uppercase",letterSpacing:"1px"}}>{a.ask_type==="need"?"Needs":"Offering"} · {a.category}</div><div style={{fontSize:15,color:C.ink,lineHeight:1.5,marginTop:6}}>{a.content}</div><div style={{fontSize:12,color:C.muted,marginTop:6}}>{a.user_name} · {ago(a.created_at)}</div></div>)}
    {asks.length===0&&!showAsk&&<div style={{padding:48,textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>💪</div><div style={{fontSize:16,fontWeight:700,color:C.ink,marginBottom:4}}>Community starts here</div><div style={{fontSize:14,color:C.muted}}>"Need a gym buddy" · "Can help with resumes"</div></div>}
    <Nav/>
  </div>}

  {/* ═══ EXPLORE ═══ */}
  {scr==="explore"&&<div style={pg}>
    <h2 style={{fontSize:24,fontWeight:800,color:C.ink,marginBottom:20}}>Neighborhoods 🗺️</h2>
    {(()=>{const st={};users.forEach(u=>{if(u.neighborhood)st[u.neighborhood]=(st[u.neighborhood]||0)+1;});const entries=Object.entries(st).sort((a,b)=>b[1]-a[1]);if(!entries.length)return<div style={{padding:48,textAlign:"center",color:C.muted}}>No signups yet. Be the first!</div>;return entries.map(([h,ct])=>{const cc=cohorts.filter(c=>c.hood===h).length;return<div key={h} style={{background:C.white,borderRadius:16,padding:"16px 20px",border:`2px solid ${C.border}`,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:15,fontWeight:700,color:C.ink}}>{h}</div>{cc>0&&<div style={{fontSize:12,fontWeight:700,color:C.green,marginTop:2}}>{pl(cc,"circle")} ✦</div>}</div><div style={{fontSize:14,fontWeight:800,color:C.muted}}>{ct}</div></div>;});})()}
    <button style={{fontSize:16,fontWeight:800,padding:"16px",borderRadius:100,background:C.green,color:"#fff",width:"100%",marginTop:16}} onClick={()=>go(me?"home":"signup")}>{me?"Back":"Join"}</button>
    {me&&<Nav/>}
  </div>}

  {/* ═══ PROFILE ═══ */}
  {scr==="profile"&&me&&<div style={pg}>
    <div style={{textAlign:"center",marginBottom:24}}><Avatar name={me.name} size={72} me/><div style={{fontSize:20,fontWeight:800,color:C.ink,marginTop:12}}>{me.name}, {me.age}</div><div style={{fontSize:14,color:C.muted}}>{me.neighborhood}</div></div>
    <div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"1px"}}>Name</div><input value={form.name} onChange={e=>sF("name",e.target.value)}/></div>
    <div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"1px"}}>Bio</div><textarea style={{minHeight:72}} value={form.bio} onChange={e=>sF("bio",e.target.value)}/></div>
    <div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"1px"}}>Interests</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{INTERESTS.map(x=><Pill key={x} on={form.interests.includes(x)} onClick={()=>tog("interests",x,5)} style={{fontSize:12,padding:"6px 14px"}}>{x}</Pill>)}</div></div>
    <div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"1px"}}>Nights</div><div style={{display:"flex",gap:6}}>{NIGHTS.map(x=><Pill key={x} on={form.nights.includes(x)} onClick={()=>tog("nights",x)} style={{flex:1,textAlign:"center",fontSize:12,padding:"8px"}}>{x}</Pill>)}</div></div>
    <div style={{display:"flex",gap:12,marginBottom:16}}><div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"1px"}}>Instagram</div><input value={form.instagram} onChange={e=>sF("instagram",e.target.value)}/></div><div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"1px"}}>Beli</div><input value={form.beli} onChange={e=>sF("beli",e.target.value)}/></div></div>
    <button style={{fontSize:16,fontWeight:800,padding:"16px",borderRadius:100,background:C.green,color:"#fff",width:"100%",...(saving?{opacity:.3}:{})}} onClick={async()=>{setSaving(true);const u={...me,name:form.name.trim()||me.name,bio:form.bio.trim(),interests:form.interests.length?form.interests:me.interests,nights:form.nights.length?form.nights:me.nights,instagram:form.instagram.trim(),beli:form.beli.trim()};if(await DB.put("users",u)){DB.setMid(u.id);setMe(u);flash("✅ Saved!");}else flash("❌ Failed");setSaving(false);go("home");}}>{saving?"Saving...":"Save changes"}</button>
    <div style={{textAlign:"center",marginTop:24}}><button style={{fontSize:14,color:C.coral,fontWeight:700}} onClick={logout}>Log out</button></div>
    <Nav/>
  </div>}

  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
