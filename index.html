function runMatch(users,cohorts){
  const matched=new Set(cohorts.flatMap(c=>c.member_ids||[]));
  const free=users.filter(u=>!matched.has(u.id)&&u.neighborhood&&u.nights?.length);
  const groups={};
  free.forEach(u=>u.nights.forEach(n=>{const k=`${u.neighborhood}::${n}`;if(!groups[k])groups[k]=[];groups[k].push(u);}));
  const res=[],used=new Set();
  Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).forEach(([k,us])=>{
    const av=us.filter(u=>!used.has(u.id));
    if(av.length>=2){
      const[h,n]=k.split("::");const take=av.slice(0,Math.min(12,av.length));
      take.forEach(u=>used.add(u.id));
      const vl=VENUES[h]||VENUES["Upper East Side"];
      const fc=take.filter(u=>u.cost_pref==="free").length;
      const pool=fc>take.length/2?vl.filter(v=>v.type==="park"):vl;
      const v=(pool.length?pool:vl)[Math.floor(Math.random()*(pool.length||vl.length))];
      const nm=CNAMES[(cohorts.length+res.length)%CNAMES.length];
      const shared=INTERESTS.filter(int=>take.filter(u=>(u.interests||[]).includes(int)).length>=2);
      res.push({id:`c-${uid()}`,name:nm,number:`#${100+cohorts.length+res.length}`,hood:h,night:n,venue:v,member_ids:take.map(u=>u.id),activity:shared[0]||"Hanging out",season:1,host_id:take[0]?.id||"",created_at:new Date().toISOString()});
    }
  });
  return res;
}

// ═══ DATABASE — with robust error handling ═══
const DB={
  async get(table,query){
    try{
      if(sb){
        let q=sb.from(table).select("*");
        if(query)Object.entries(query).forEach(([k,v])=>{q=q.eq(k,v);});
        const{data,error}=await q.order("created_at",{ascending:false});
        if(error){console.error(`DB.get ${table}:`,error.message);return[];}
        return data||[];
      }
      const all=JSON.parse(localStorage.getItem(`co_${table}`)||"[]");
      if(query)return all.filter(x=>Object.entries(query).every(([k,v])=>String(x[k])===String(v)));
      return all;
    }catch(e){console.error(`DB.get ${table} failed:`,e);return[];}
  },
  async put(table,doc){
    try{
      if(sb){const{error}=await sb.from(table).upsert(doc,{onConflict:"id"});if(error)console.error(`DB.put ${table}:`,error.message);}
      else{const all=await this.get(table);const i=all.findIndex(x=>x.id===doc.id);if(i>=0)all[i]=doc;else all.push(doc);localStorage.setItem(`co_${table}`,JSON.stringify(all));}
    }catch(e){console.error(`DB.put ${table} failed:`,e);}
  },
  async add(table,doc){
    try{
      if(sb){const{error}=await sb.from(table).insert(doc);if(error)console.error(`DB.add ${table}:`,error.message);}
      else{const all=await this.get(table);all.unshift(doc);localStorage.setItem(`co_${table}`,JSON.stringify(all));}
    }catch(e){console.error(`DB.add ${table} failed:`,e);}
  },
  async del(table,query){
    try{
      if(sb){let q=sb.from(table).delete();Object.entries(query).forEach(([k,v])=>{q=q.eq(k,v);});const{error}=await q;if(error)console.error(`DB.del ${table}:`,error.message);}
      else{const all=await this.get(table);const f=all.filter(x=>!Object.entries(query).every(([k,v])=>String(x[k])===String(v)));localStorage.setItem(`co_${table}`,JSON.stringify(f));}
    }catch(e){console.error(`DB.del ${table} failed:`,e);}
  },
  async toggleRsvp(uid,cid,wk){
    const key=`${uid}-${cid}-${wk}`;
    const ex=await this.get("rsvps",{user_id:uid,cohort_id:cid});
    const match=ex.find(r=>r.week===wk||String(r.week)===String(wk));
    if(match){await this.del("rsvps",{id:match.id});return false;}
    else{await this.add("rsvps",{id:key,user_id:uid,cohort_id:cid,week:wk,status:"going",created_at:new Date().toISOString()});return true;}
  },
  mid(){return localStorage.getItem("co-me");},
  setMid(id){localStorage.setItem("co-me",id);},
  clearMid(){localStorage.removeItem("co-me");},
};

  chip:on=>({...sans,fontSize:13,padding:"9px 20px",borderRadius:28,border:`1.5px solid ${on?T.green:T.border}`,background:on?T.greenP:T.card,color:on?T.green:T.muted,fontWeight:on?500:400,transition:"all .2s"}),
  chipL:on=>({...sans,fontSize:14,padding:"14px 20px",borderRadius:14,border:`1.5px solid ${on?T.green:T.border}`,background:on?T.greenP:T.card,color:on?T.green:T.text,fontWeight:on?500:400,transition:"all .2s",width:"100%",textAlign:"left"}),
  btn:{...sans,fontSize:14,fontWeight:600,padding:"16px 36px",borderRadius:12,border:"none",background:T.green,color:"#fff",width:"100%",letterSpacing:".3px"},
  btnO:{...sans,fontSize:14,fontWeight:500,padding:"14px 28px",borderRadius:12,border:`1.5px solid ${T.border}`,background:"transparent",color:T.text,width:"100%"},
  btnSm:{...sans,fontSize:12,fontWeight:600,padding:"8px 20px",borderRadius:24},
  dis:{opacity:.3,pointerEvents:"none"},
  card:{background:T.card,border:`1px solid ${T.borderL}`,borderRadius:16,padding:"22px 24px",marginBottom:12,transition:"box-shadow .2s"},
  av:(h,s=44)=>({width:s,height:s,borderRadius:"50%",background:`hsl(${h},25%,88%)`,display:"flex",alignItems:"center",justifyContent:"center",...sans,fontSize:s*.36,fontWeight:600,color:`hsl(${h},25%,38%)`,flexShrink:0}),

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const[scr,setScr]=useState("landing");
  const[me,setMe]=useState(null);
  const[users,setUsers]=useState([]);
  const[cohorts,setCohorts]=useState([]);
  const[rsvps,setRsvps]=useState([]);
  const[posts,setPosts]=useState([]);
  const[events,setEvents]=useState([]);
  const[asks,setAsks]=useState([]);
  const[memos,setMemos]=useState([]);
  const[checkins,setCIs]=useState([]);
  const[rituals,setRituals]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[dbError,setDbError]=useState(null);
  const[step,setStep]=useState(1);
  const[tab,setTab]=useState("members");
  const[openWk,setOpenWk]=useState(null);
  const[openMem,setOpenMem]=useState(null);
  const[toast,setToast]=useState(null);
  const[form,setForm]=useState({name:"",age:"",neighborhood:"",bio:"",interests:[],nights:[],life_stage:"",intention:"",cultural_prefs:[],cost_pref:"",venue_types:[],instagram:"",beli:"",prompts:[{q:PROMPTS_LIST[0],a:""},{q:PROMPTS_LIST[2],a:""}],badges:[],vibe:"",commitment:3});
  const[newPost,setNewPost]=useState("");
  const[memInput,setMemInput]=useState("");
  const[askForm,setAskForm]=useState({content:"",ask_type:"need",category:"General"});
  const[evForm,setEvForm]=useState({title:"",description:"",location:"",venue_type:"bar",cost:"free",event_date:"",event_time:"19:30",is_cultural_exchange:false});
  const[ritForm,setRitForm]=useState({title:"",description:"",day_of_week:"",time:"",location:""});
  const[ciForm,setCiForm]=useState({felt_welcome:3,felt_safe:3,group_energy:3,would_return:true,note:""});
  const[showEvForm,setShowEvForm]=useState(false);
  const[showAskForm,setShowAskForm]=useState(false);
  const[showRitForm,setShowRitForm]=useState(false);
  const[showCI,setShowCI]=useState(null);
  const ref=useRef(null);

  const go=useCallback(s=>{setScr(s);setOpenWk(null);setOpenMem(null);setTimeout(()=>ref.current?.scrollIntoView({behavior:"instant"}),10);},[]);
  const flash=m=>{setToast(m);setTimeout(()=>setToast(null),3500);};
  const sF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const togArr=(key,val)=>setForm(f=>({...f,[key]:f[key].includes(val)?f[key].filter(x=>x!==val):key==="interests"&&f[key].length>=5?f[key]:key==="badges"&&f[key].length>=5?f[key]:[...f[key],val]}));

  // ─── LOAD ───
  const loadAll=useCallback(async()=>{
    setLoading(true);setDbError(null);
    try{
      // Test connection first
      if(sb){
        const{error:testErr}=await sb.from("users").select("id").limit(1);
        if(testErr){
          console.error("DB connection test failed:", testErr.message);
          setDbError(`Database error: ${testErr.message}. Have you run the SQL setup? Check the comment block in index.html.`);
          setLoading(false);
          return;
        }
      }
      const[u,c]=await Promise.all([DB.get("users"),DB.get("cohorts")]);
      setUsers(u);setCohorts(c);
      const mid=DB.mid();
      if(mid){
        const found=u.find(x=>x.id===mid);
        if(found){
          setMe(found);setScr("home");
          const mc=c.find(co=>(co.member_ids||[]).includes(mid));
          if(mc){
            const[r,p,e,a,m,ci,ri]=await Promise.all([
              DB.get("rsvps",{cohort_id:mc.id}),DB.get("posts",{cohort_id:mc.id}),
              DB.get("events",{cohort_id:mc.id}),DB.get("asks",{cohort_id:mc.id}),
              DB.get("memories",{cohort_id:mc.id}),DB.get("checkins",{cohort_id:mc.id}),
              DB.get("rituals",{cohort_id:mc.id}),
            ]);
            setRsvps(r);setPosts(p);setEvents(e);setAsks(a);setMemos(m);setCIs(ci);setRituals(ri);
          }
        }
      }
    }catch(e){console.error("Load error:",e);setDbError(`Failed to load: ${e.message}`);}
    setLoading(false);
  },[]);
  useEffect(()=>{loadAll();},[loadAll]);

  const refresh=useCallback(async()=>{
    flash("Refreshing...");
    const[u,c]=await Promise.all([DB.get("users"),DB.get("cohorts")]);
    setUsers(u);setCohorts(c);
    if(me){
      const up=u.find(x=>x.id===me.id);if(up)setMe(up);
      const mc=c.find(co=>(co.member_ids||[]).includes(me.id));
      if(mc){
        const[r,p,e,a,m,ci,ri]=await Promise.all([DB.get("rsvps",{cohort_id:mc.id}),DB.get("posts",{cohort_id:mc.id}),DB.get("events",{cohort_id:mc.id}),DB.get("asks",{cohort_id:mc.id}),DB.get("memories",{cohort_id:mc.id}),DB.get("checkins",{cohort_id:mc.id}),DB.get("rituals",{cohort_id:mc.id})]);
        setRsvps(r);setPosts(p);setEvents(e);setAsks(a);setMemos(m);setCIs(ci);setRituals(ri);
      }
    }
    flash("Updated.");
  },[me]);

  // ─── DERIVED ───
  const mc=useMemo(()=>cohorts.find(c=>(c.member_ids||[]).includes(me?.id)),[cohorts,me]);
  const members=useMemo(()=>mc?users.filter(u=>(mc.member_ids||[]).includes(u.id)&&u.id!==me?.id):[],[mc,users,me]);
  const season=useMemo(()=>mc?genSeason(mc.night):null,[mc]);
  const currentWeek=useMemo(()=>{if(!season)return null;return season.find(w=>!w.past)||season[7];},[season]);
  const ritual=useMemo(()=>currentWeek?WEEK_RITUALS[currentWeek.week-1]:null,[currentWeek]);
  const myRsvps=useMemo(()=>new Set(rsvps.filter(r=>r.user_id===me?.id).map(r=>Number(r.week))),[rsvps,me]);
  const pairBuddy=useMemo(()=>{if(!mc||!members.length||!currentWeek)return null;return members[(currentWeek.week+(me?.name||"").charCodeAt(0))%members.length];},[mc,members,currentWeek,me]);
  const hoodWait=useMemo(()=>users.filter(u=>u.neighborhood===me?.neighborhood&&u.id!==me?.id&&!cohorts.some(c=>(c.member_ids||[]).includes(u.id))),[users,me,cohorts]);
  const hoodStats=useMemo(()=>{const s={};users.forEach(u=>{if(u.neighborhood)s[u.neighborhood]=(s[u.neighborhood]||0)+1;});return Object.entries(s).sort((a,b)=>b[1]-a[1]);},[users]);
  const trustLevel=useMemo(()=>{if(!mc||!season)return 0;return season.filter(w=>w.past).length;},[mc,season]);
  const attendanceRate=useMemo(()=>{if(!mc||!season)return 0;const pw=season.filter(w=>w.past).length;if(!pw)return 100;return Math.round(myRsvps.size/pw*100);},[mc,season,myRsvps]);
  const canSign=form.name&&form.age>=21&&form.age<=34&&form.neighborhood&&form.interests.length>=3&&form.nights.length>=1;

  // ─── ACTIONS ───
  const signup=async()=>{
    setSaving(true);
    const userData={id:uid(),name:form.name.trim(),age:parseInt(form.age),neighborhood:form.neighborhood,bio:form.bio.trim(),interests:form.interests,nights:form.nights,life_stage:form.life_stage,intention:form.intention,cultural_prefs:form.cultural_prefs,cost_pref:form.cost_pref,venue_types:form.venue_types,instagram:form.instagram.trim(),beli:form.beli.trim(),prompts:form.prompts.filter(p=>p.a.trim()),badges:form.badges,vibe:form.vibe,commitment:form.commitment,vouched_by:"",alumni:false,joined_at:new Date().toISOString()};
    await DB.put("users",userData);DB.setMid(userData.id);setMe(userData);
    const[au,ac]=await Promise.all([DB.get("users"),DB.get("cohorts")]);
    setUsers(au);setCohorts(ac);
    const nc=runMatch(au,ac);
    for(const c of nc)await DB.put("cohorts",c);
    if(nc.length){setCohorts([...ac,...nc]);flash("You've been matched into a cohort!");}
    else flash("You're on the waitlist. Share the link to get matched faster.");
    setSaving(false);go("home");
  };

  const updateProfile=async()=>{if(!me)return;setSaving(true);const u={...me,name:form.name.trim()||me.name,bio:form.bio.trim(),interests:form.interests.length?form.interests:me.interests,nights:form.nights.length?form.nights:me.nights,instagram:form.instagram.trim(),beli:form.beli.trim(),prompts:form.prompts.filter(p=>p.a.trim()),badges:form.badges,vibe:form.vibe,life_stage:form.life_stage||me.life_stage,intention:form.intention||me.intention,cultural_prefs:form.cultural_prefs.length?form.cultural_prefs:(me.cultural_prefs||[]),cost_pref:form.cost_pref||me.cost_pref,venue_types:form.venue_types.length?form.venue_types:(me.venue_types||[])};await DB.put("users",u);DB.setMid(u.id);setMe(u);flash("Saved.");setSaving(false);go("home");};
  const doRsvp=async wk=>{if(!me||!mc)return;await DB.toggleRsvp(me.id,mc.id,wk);setRsvps(await DB.get("rsvps",{cohort_id:mc.id}));};
  const doPost=async()=>{if(!me||!mc||!newPost.trim())return;await DB.add("posts",{id:`p-${uid()}`,cohort_id:mc.id,user_id:me.id,user_name:me.name,content:newPost.trim(),post_type:"update",created_at:new Date().toISOString()});setNewPost("");setPosts(await DB.get("posts",{cohort_id:mc.id}));flash("Posted.");};
  const doMem=async()=>{if(!me||!mc||!memInput.trim()||!currentWeek)return;await DB.add("memories",{id:`m-${uid()}`,cohort_id:mc.id,user_id:me.id,user_name:me.name,content:memInput.trim(),week:currentWeek.week,created_at:new Date().toISOString()});setMemInput("");setMemos(await DB.get("memories",{cohort_id:mc.id}));flash("Memory saved.");};
  const doEvent=async()=>{if(!me||!mc||!evForm.title.trim())return;await DB.add("events",{id:`e-${uid()}`,cohort_id:mc.id,created_by:me.id,creator_name:me.name,...evForm,title:evForm.title.trim(),attendee_ids:[me.id],created_at:new Date().toISOString()});setEvForm({title:"",description:"",location:"",venue_type:"bar",cost:"free",event_date:"",event_time:"19:30",is_cultural_exchange:false});setShowEvForm(false);setEvents(await DB.get("events",{cohort_id:mc.id}));flash("Hangout created.");};
  const joinEvent=async eid=>{if(!me||!mc)return;const ev=events.find(e=>e.id===eid);if(ev){ev.attendee_ids=[...(ev.attendee_ids||[]),me.id];await DB.put("events",ev);setEvents(await DB.get("events",{cohort_id:mc.id}));flash("You're in.");}};
  const doAsk=async()=>{if(!me||!mc||!askForm.content.trim())return;await DB.add("asks",{id:`a-${uid()}`,cohort_id:mc.id,user_id:me.id,user_name:me.name,...askForm,content:askForm.content.trim(),resolved:false,helper_id:"",helper_name:"",created_at:new Date().toISOString()});setAskForm({content:"",ask_type:"need",category:"General"});setShowAskForm(false);setAsks(await DB.get("asks",{cohort_id:mc.id}));flash("Posted.");};
  const resolveAsk=async id=>{if(!me)return;const a=asks.find(x=>x.id===id);if(a){a.resolved=true;a.helper_id=me.id;a.helper_name=me.name;await DB.put("asks",a);setAsks(await DB.get("asks",{cohort_id:mc.id}));flash("Resolved.");}};
  const doRitual=async()=>{if(!me||!mc||!ritForm.title.trim())return;await DB.add("rituals",{id:`r-${uid()}`,cohort_id:mc.id,created_by:me.id,creator_name:me.name,...ritForm,title:ritForm.title.trim(),recurring:true,created_at:new Date().toISOString()});setRitForm({title:"",description:"",day_of_week:"",time:"",location:""});setShowRitForm(false);setRituals(await DB.get("rituals",{cohort_id:mc.id}));flash("Ritual created.");};
  const doCheckin=async wk=>{if(!me||!mc)return;await DB.add("checkins",{id:`ci-${uid()}`,user_id:me.id,cohort_id:mc.id,week:wk,...ciForm,created_at:new Date().toISOString()});setShowCI(null);setCIs(await DB.get("checkins",{cohort_id:mc.id}));flash("Thanks for checking in.");};
  const share=()=>{const u=window.location.href;if(navigator.share)navigator.share({title:"Cohort",text:"Join a cohort in your neighborhood.",url:u});else{navigator.clipboard?.writeText(u);flash("Link copied");}};
  const logout=()=>{DB.clearMid();setMe(null);go("landing");};

  // ─── COMPONENTS ───
  const BadgeRow=({ids})=><div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:5}}>{(ids||[]).map(id=>{const b=BADGES.find(x=>x.id===id);return b?<span key={id} style={{...sans,fontSize:10.5,padding:"3px 9px",borderRadius:8,background:T.warm,color:T.muted}}>{b.i} {b.l}</span>:null;})}</div>;
  const Nav=()=>(me&&mc)?<div className="bnav">{[["home","Home","home"],["circle","Circle","circle"],["ritual","Rituals","ritual"],["ask","Ask/Offer","ask"],["profile","Profile","profile"]].map(([s,l,i])=><button key={s} className={scr===s?"on":""} onClick={()=>go(s)}>{Ico[i](scr===s?T.green:T.faint)}<span>{l}</span></button>)}</div>:null;
  const Back=({to})=><div style={{textAlign:"center",marginTop:16}}><button style={{...sans,fontSize:13,color:T.faint}} onClick={()=>go(to)}>Back</button></div>;

  // ═══ RENDER ═══
  if(loading)return<div style={{background:T.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div className="spinner"/></div>;

  return(
  <div style={{background:T.bg,color:T.text,minHeight:"100vh"}}>
  <div ref={ref}/>
  {toast&&<div style={{position:"fixed",bottom:mc?76:28,left:"50%",transform:"translateX(-50%)",zIndex:999,...sans,fontSize:13,fontWeight:500,background:T.ink,color:"#fff",padding:"13px 28px",borderRadius:14,animation:"slideUp .3s ease",boxShadow:"0 4px 24px #0002",maxWidth:"88vw",textAlign:"center"}}>{toast}</div>}

  {/* ═══ LANDING ═══ */}
  {scr==="landing"&&<div>
    <LandscapeHero/>
    <div style={{maxWidth:440,margin:"0 auto",padding:"0 24px 80px",textAlign:"center"}}>
      {dbError&&<div className="err-box">{dbError}</div>}

      <div style={{animation:"fadeUp .7s ease .45s both"}}>
        <button style={S.btn} onClick={()=>{setStep(1);go("signup");}}>Find my people</button>
      </div>
      <div style={{...sans,fontSize:12,color:T.faint,marginTop:16,animation:"fadeUp .7s ease .55s both"}}>
        {pl(users.length,"person")} joined &middot; {pl(cohorts.length,"circle")} formed
      </div>

      {/* How it works — inline */}
      <div style={{marginTop:48,textAlign:"left",animation:"fadeUp .7s ease .65s both"}}>
        <div style={{...sans,fontSize:14,fontWeight:600,color:T.ink,marginBottom:20,textAlign:"center"}}>How it works</div>
        {[
          {n:"01",t:"Tell us your neighborhood and interests",d:"Two minutes. We need your radius and what gets you out."},
          {n:"02",t:"We build your cohort",d:"8–12 people matched by proximity and overlap. Not compatibility scores."},
          {n:"03",t:"Same group, same night, 8 weeks",d:"Your cohort meets weekly. Strangers become familiar by week 3, friends by 5."},
          {n:"04",t:"The app disappears",d:"After 8 weeks, the cohort continues without us — or you re-shuffle."},
        ].map((item,i)=>(
          <div key={i} style={{display:"flex",gap:16,marginBottom:20}}>
            <div style={{...mono,fontSize:11,color:T.green,flexShrink:0,paddingTop:3,width:20}}>{item.n}</div>
            <div>
              <div style={{...sans,fontSize:14,fontWeight:500,color:T.ink,marginBottom:3}}>{item.t}</div>
              <div style={{...sans,fontSize:13,color:T.muted,lineHeight:1.6}}>{item.d}</div>
            </div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:24,justifyContent:"center",marginTop:32,...sans,fontSize:13,animation:"fadeUp .7s ease .75s both"}}>
        <button style={{color:T.green}} onClick={()=>go("about")}>About</button>
        <button style={{color:T.green}} onClick={()=>go("explore")}>Neighborhoods</button>
        <button style={{color:T.green}} onClick={()=>go("safety")}>Guidelines</button>
      </div>

      {!hasSB&&<div className="err-box" style={{marginTop:32}}>
        Running in local mode. To enable real multi-user matching, add your Supabase credentials to the code and run the SQL setup.
      </div>}
    </div>
  </div>}

  {/* ═══ ABOUT ═══ */}
  {scr==="about"&&<div style={S.page}>
    <Logo size={100}/>
    <div style={{...sans,fontSize:14.5,color:T.text,lineHeight:1.8,marginTop:24}}>
      <p style={{marginBottom:16}} className="fu">Community used to be the default. You made friends through repeated contact with the same people in the same places — until familiarity became friendship. That infrastructure is gone.</p>
      <p style={{marginBottom:16,animation:"fadeUp .5s ease .1s both"}}>Cohort manufactures the conditions where strangers become familiar, familiar people become reliable, and reliable people become each other's real-life community.</p>
      <p style={{animation:"fadeUp .5s ease .2s both"}}>This is not a friend-matching app. Not a nightlife planner. Not networking with better branding. It's a tool that puts you in a small group, gives you a night and a place, and gets out of the way.</p>
    </div>
    <hr className="div"/>
    <button style={S.btn} onClick={()=>go(me?"home":"signup")}>{me?"Back":"Join"}</button>
    <Back to={me?"home":"landing"}/>
  </div>}

  {/* ═══ SAFETY ═══ */}
  {scr==="safety"&&<div style={S.page}>
    <div style={S.sTag} className="fu">Kindness pledge</div>
    <h2 style={{...serif,fontSize:24,fontWeight:400,color:T.ink,marginBottom:24}} className="fu">Community guidelines</h2>
    {GUIDELINES.map((g,i)=><div key={i} style={{...S.card,animation:`fadeUp .4s ease ${i*.05}s both`}} className="card"><div style={{...sans,fontSize:14,fontWeight:600,color:T.ink,marginBottom:4}}>{g.t}</div><div style={{...sans,fontSize:13,color:T.muted,lineHeight:1.6}}>{g.d}</div></div>)}
    <hr className="div"/><button style={S.btn} onClick={()=>go(me?"home":"landing")}>Back</button>
  </div>}

  {/* ═══ EXPLORE ═══ */}
  {scr==="explore"&&<div style={S.page}>
    <div style={S.sTag} className="fu">Neighborhoods</div>
    <h2 style={{...serif,fontSize:24,fontWeight:400,color:T.ink,marginBottom:24}} className="fu">Where people are joining</h2>
    {hoodStats.length===0&&<div style={{...sans,fontSize:14,color:T.faint,textAlign:"center",padding:40}}>No signups yet. Be the first.</div>}
    {hoodStats.map(([h,ct],i)=>{const cc=cohorts.filter(c=>c.hood===h).length;const pct=Math.min(100,Math.round(ct/Math.max(1,users.length)*100));
      return<div key={h} style={{...S.card,animation:`fadeUp .3s ease ${i*.03}s both`}} className="card">
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{...sans,fontSize:14,fontWeight:500,color:T.ink}}>{h}</span><span style={{...sans,fontSize:12,color:T.faint}}>{pl(ct,"person")}</span></div>
        <div style={{height:5,background:T.surface,borderRadius:3,overflow:"hidden",marginBottom:6}}><div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${T.green},${T.greenL})`,borderRadius:3}}/></div>
        {cc>0&&<span style={{...sans,fontSize:11,color:T.green}}>{pl(cc,"circle")} active</span>}
      </div>;
    })}
    <hr className="div"/><button style={S.btn} onClick={()=>go(me?"home":"signup")}>{me?"Back":"Join"}</button>
    {!me&&<Back to="landing"/>}
    {me&&<Nav/>}
  </div>}

  {/* ═══ SIGNUP — 6 STEPS ═══ */}
  {scr==="signup"&&<div style={S.page}>
    <div style={{display:"flex",gap:7,justifyContent:"center",margin:"0 0 40px"}}>{[1,2,3,4,5,6].map(s=><div key={s} style={{width:7,height:7,borderRadius:"50%",background:s<=step?T.green:T.border,transition:"all .3s"}}/>)}</div>

    {step===1&&<><h2 style={{...serif,fontSize:24,fontWeight:400,color:T.ink,marginBottom:10}} className="fu">The basics</h2>
      <p style={{...sans,fontSize:14,color:T.muted,lineHeight:1.7,marginBottom:28}}>First name, age, neighborhood.</p>
      <div style={{marginBottom:20}}><label style={S.label}>First name *</label><input style={S.input} value={form.name} onChange={e=>sF("name",e.target.value)} placeholder="What your cohort calls you"/></div>
      <div style={{marginBottom:20}}><label style={S.label}>Age *</label><input style={S.input} type="number" min={21} max={34} value={form.age} onChange={e=>sF("age",e.target.value)} placeholder="21–34"/></div>
      <div style={{marginBottom:32}}><label style={S.label}>Neighborhood *</label><select style={{...S.input,appearance:"none"}} value={form.neighborhood} onChange={e=>sF("neighborhood",e.target.value)}><option value="">Select</option>{HOODS.map(n=><option key={n} value={n}>{n}</option>)}</select></div>
      <button style={{...S.btn,...(!form.name||!form.age||form.age<21||form.age>34||!form.neighborhood?S.dis:{})}} onClick={()=>setStep(2)}>Continue</button>
      <Back to="landing"/>
    </>}

    {step===2&&<><h2 style={{...serif,fontSize:24,fontWeight:400,color:T.ink,marginBottom:10}} className="fu">Where are you in life?</h2>
      <label style={S.label}>Life stage</label>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:28}}>{LIFE_STAGES.map(ls=><button key={ls.id} style={S.chipL(form.life_stage===ls.id)} onClick={()=>sF("life_stage",form.life_stage===ls.id?"":ls.id)} className="chip-btn">{ls.icon} {ls.label}</button>)}</div>
      <label style={S.label}>What are you looking for?</label>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:28}}>{INTENTIONS.map(it=><button key={it.id} style={S.chipL(form.intention===it.id)} onClick={()=>sF("intention",form.intention===it.id?"":it.id)} className="chip-btn"><div style={{fontWeight:form.intention===it.id?500:400}}>{it.label}</div><div style={{fontSize:12,color:T.faint,marginTop:3}}>{it.desc}</div></button>)}</div>
      <button style={S.btn} onClick={()=>setStep(3)}>Continue</button><Back to="signup"/>
    </>}

    {step===3&&<><h2 style={{...serif,fontSize:24,fontWeight:400,color:T.ink,marginBottom:10}} className="fu">Interests & availability</h2>
      <label style={S.label}>Interests * ({form.interests.length}/5)</label>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:28}}>{INTERESTS.map(x=><button key={x} className="chip-btn" style={S.chip(form.interests.includes(x))} onClick={()=>togArr("interests",x)}>{x}</button>)}</div>
      <label style={S.label}>Available nights *</label>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:32}}>{NIGHTS.map(x=><button key={x} className="chip-btn" style={{...S.chip(form.nights.includes(x)),minWidth:68,textAlign:"center"}} onClick={()=>togArr("nights",x)}>{x}</button>)}</div>
      <button style={{...S.btn,...(form.interests.length<3||form.nights.length<1?S.dis:{})}} onClick={()=>setStep(4)}>Continue</button><Back to="signup"/>
    </>}

    {step===4&&<><h2 style={{...serif,fontSize:24,fontWeight:400,color:T.ink,marginBottom:10}} className="fu">Your comfort zone</h2>
      <p style={{...sans,fontSize:14,color:T.muted,marginBottom:24}}>All optional. Helps us match better.</p>
      <label style={S.label}>Cultural comfort</label>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:24}}>{CULTURAL.map(cp=><button key={cp.id} className="chip-btn" style={S.chip(form.cultural_prefs.includes(cp.id))} onClick={()=>togArr("cultural_prefs",cp.id)}>{cp.label}</button>)}</div>
      <label style={S.label}>Cost preference</label>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>{COSTS.map(cp=><button key={cp.id} style={S.chipL(form.cost_pref===cp.id)} onClick={()=>sF("cost_pref",form.cost_pref===cp.id?"":cp.id)} className="chip-btn"><div>{cp.label}</div><div style={{fontSize:12,color:T.faint,marginTop:2}}>{cp.desc}</div></button>)}</div>
      <label style={S.label}>Venue types</label>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:28}}>{VTYPES.map(vt=><button key={vt.id} className="chip-btn" style={S.chip(form.venue_types.includes(vt.id))} onClick={()=>togArr("venue_types",vt.id)}>{vt.label}</button>)}</div>
      <button style={S.btn} onClick={()=>setStep(5)}>Continue</button><Back to="signup"/>
    </>}

    {step===5&&<><h2 style={{...serif,fontSize:24,fontWeight:400,color:T.ink,marginBottom:10}} className="fu">Personality</h2>
      <label style={S.label}>Profile prompts</label>
      {form.prompts.map((p,i)=><div key={i} style={{marginBottom:16}}>
        <select style={{...S.input,fontSize:13,marginBottom:8}} value={p.q} onChange={e=>{const pr=[...form.prompts];pr[i]={...pr[i],q:e.target.value};sF("prompts",pr);}}>{PROMPTS_LIST.map(q=><option key={q} value={q}>{q}</option>)}</select>
        <textarea style={{...S.input,minHeight:60}} placeholder="Your answer..." value={p.a} onChange={e=>{const pr=[...form.prompts];pr[i]={...pr[i],a:e.target.value};sF("prompts",pr);}}/>
      </div>)}
      <button style={{...sans,fontSize:12,color:T.green,marginBottom:20}} onClick={()=>sF("prompts",[...form.prompts,{q:PROMPTS_LIST[Math.floor(Math.random()*PROMPTS_LIST.length)],a:""}])}>+ Add prompt</button>
      <hr className="div"/>
      <label style={S.label}>Badges ({form.badges.length}/5)</label>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:24}}>{BADGES.map(b=><button key={b.id} className="chip-btn" style={S.chip(form.badges.includes(b.id))} onClick={()=>togArr("badges",b.id)}>{b.i} {b.l}</button>)}</div>
      <label style={S.label}>Vibe</label>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:28}}>{VIBES.map(v=><button key={v} className="chip-btn" style={S.chip(form.vibe===v)} onClick={()=>sF("vibe",form.vibe===v?"":v)}>{v}</button>)}</div>
      <button style={S.btn} onClick={()=>setStep(6)}>Continue</button><Back to="signup"/>
    </>}

    {step===6&&<><h2 style={{...serif,fontSize:24,fontWeight:400,color:T.ink,marginBottom:10}} className="fu">Final details</h2>
      <div style={{marginBottom:20}}><label style={S.label}>About you</label><textarea style={{...S.input,minHeight:80}} value={form.bio} onChange={e=>sF("bio",e.target.value)} placeholder="Where you're from, what you do, why you're here."/></div>
      <div style={{marginBottom:20}}><label style={S.label}>Instagram</label><input style={S.input} value={form.instagram} onChange={e=>sF("instagram",e.target.value)} placeholder="@handle"/></div>
      <div style={{marginBottom:20}}><label style={S.label}>Beli</label><input style={S.input} value={form.beli} onChange={e=>sF("beli",e.target.value)} placeholder="For reservations"/><div style={{...sans,fontSize:12,color:T.faint,marginTop:8}}><a href="https://bfrnd.link/download" target="_blank" rel="noopener">Get Beli</a></div></div>
      <hr className="div"/>
      <label style={S.label}>Attendance commitment</label>
      <div style={{display:"flex",gap:10,marginBottom:28}}>{[5,6,7,8].map(n=><button key={n} style={{...S.chip(form.commitment===n),flex:1,textAlign:"center",fontWeight:600}} onClick={()=>sF("commitment",n)}>{n}/8</button>)}</div>
      <div style={{...sans,fontSize:13,color:T.text,marginBottom:14}}>By joining, you agree to the <button style={{...sans,fontSize:13,color:T.green,textDecoration:"underline",padding:0}} onClick={()=>go("safety")}>community guidelines</button>.</div>
      <div style={{...S.card,marginBottom:24}}><div style={{...sans,fontSize:14,fontWeight:600,color:T.ink}}>{form.name}, {form.age}, {form.neighborhood}</div><div style={{...sans,fontSize:12,color:T.muted,marginTop:4}}>{form.interests.join(", ")}</div><div style={{...sans,fontSize:12,color:T.muted}}>{form.nights.map(n=>NF[n]).join(", ")} &middot; {form.commitment}/8 weeks</div>{form.life_stage&&<div style={{...sans,fontSize:12,color:T.green,marginTop:6}}>{LIFE_STAGES.find(ls=>ls.id===form.life_stage)?.icon} {LIFE_STAGES.find(ls=>ls.id===form.life_stage)?.label}</div>}<BadgeRow ids={form.badges}/></div>
      <button style={{...S.btn,...(!canSign||saving?S.dis:{})}} onClick={signup}>{saving?"Matching you...":"Join the waitlist"}</button><Back to="signup"/>
    </>}
  </div>}

  {/* ═══ HOME ═══ */}
  {scr==="home"&&me&&<div style={S.page}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}><Logo size={48}/><div style={S.sTag}>Cohort</div></div>
      <button style={{...sans,fontSize:12,color:T.green,fontWeight:600}} onClick={refresh}>Refresh</button>
    </div>

    {mc?<>
      {currentWeek&&!currentWeek.past&&<div style={{...S.card,marginBottom:16,borderLeft:`4px solid ${T.green}`,borderRadius:0,borderTopRightRadius:16,borderBottomRightRadius:16}}>
        <div style={{...sans,fontSize:10,color:T.faint,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8}}>This week</div>
        <div style={{...sans,fontSize:18,fontWeight:600,color:T.ink,marginBottom:4}}>{NF[mc.night]}, {currentWeek.short}</div>
        <div style={{...sans,fontSize:13,color:T.muted,marginBottom:12}}>{mc.venue?.name} &middot; 7:30 PM</div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <button style={{...S.btnSm,border:`1.5px solid ${myRsvps.has(currentWeek.week)?T.green:T.border}`,background:myRsvps.has(currentWeek.week)?T.greenP:"transparent",color:myRsvps.has(currentWeek.week)?T.green:T.faint}} onClick={()=>doRsvp(currentWeek.week)}>{myRsvps.has(currentWeek.week)?"Going":"RSVP"}</button>
          {mc.venue?.beli&&<a href={`https://bfrnd.link/${mc.venue.beli}`} target="_blank" rel="noopener" style={{...sans,fontSize:12}}>Reserve on Beli</a>}
        </div>
      </div>}

      {ritual&&<div style={{...S.card,background:T.greenF,marginBottom:16}}>
        <div style={{...sans,fontSize:10,color:T.green,fontWeight:600,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8}}>Week {ritual.week} &middot; {ritual.title}</div>
        <div style={{...sans,fontSize:13,color:T.text,lineHeight:1.65}}>{ritual.prompt}</div>
      </div>}

      {pairBuddy&&<div style={{...S.card,background:T.brownF,marginBottom:16}}>
        <div style={{...sans,fontSize:10,color:T.brown,fontWeight:600,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8}}>1:1 this week</div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={S.av(((pairBuddy.name||"").charCodeAt(0)*47+120)%360,38)}>{(pairBuddy.name||"?")[0]}</div>
          <div><div style={{...sans,fontSize:14,fontWeight:500,color:T.ink}}>{pairBuddy.name}</div><div style={{...sans,fontSize:12,color:T.muted}}>Coffee or a walk — just you two.</div></div>
        </div>
      </div>}

      <div style={{...sans,fontSize:14,fontWeight:600,color:T.ink,marginBottom:10}}>Your circle</div>
      <div style={{display:"flex",gap:16,overflowX:"auto",paddingBottom:8,marginBottom:16}}>
        <div style={{textAlign:"center",flexShrink:0}}><div style={{...S.av(155,46),background:T.greenP,color:T.green,margin:"0 auto 5px"}}>{me.name[0].toUpperCase()}</div><div style={{...sans,fontSize:10,color:T.text}}>You</div></div>
        {members.map(m=><div key={m.id} style={{textAlign:"center",flexShrink:0}}><div style={{...S.av(((m.name||"").charCodeAt(0)*47+120)%360,46),margin:"0 auto 5px"}}>{(m.name||"?")[0]}</div><div style={{...sans,fontSize:10,color:T.text}}>{m.name}</div></div>)}
      </div>

      {posts.length>0&&<><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{...sans,fontSize:14,fontWeight:600,color:T.ink}}>Recent</span><button style={{...sans,fontSize:12,color:T.green}} onClick={()=>{setTab("feed");go("circle");}}>See all</button></div>
        {posts.slice(0,2).map(p=><div key={p.id} style={{...S.card,padding:"16px 20px"}}><div style={{...sans,fontSize:12,color:T.faint,marginBottom:4}}><strong style={{color:T.text}}>{p.user_name}</strong> &middot; {ago(p.created_at)}</div><div style={{...sans,fontSize:13,color:T.text,lineHeight:1.6}}>{p.content}</div></div>)}</>}

      <hr className="div"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
        {[{l:"Members",v:mc.member_ids.length},{l:"Your rate",v:attendanceRate+"%"},{l:"Season",v:mc.season||1}].map((x,i)=><div key={i} style={{...S.card,textAlign:"center",padding:"14px 10px"}}><div style={{...sans,fontSize:10,color:T.faint,textTransform:"uppercase",letterSpacing:"1px",marginBottom:4}}>{x.l}</div><div style={{...sans,fontSize:22,fontWeight:600,color:T.ink}}>{x.v}</div></div>)}
      </div>
      <div style={{display:"flex",gap:10}}><button style={{...S.btnO,flex:1}} onClick={share}>Invite</button><button style={{...S.btnO,flex:1}} onClick={()=>go("explore")}>Explore</button></div>
    </>:<>
      <h2 style={{...serif,fontSize:22,fontWeight:400,color:T.ink,marginBottom:8}} className="fu">Hey, {me.name}.</h2>
      <p style={{...sans,fontSize:14.5,color:T.muted,lineHeight:1.7,marginBottom:28}}>You're on the list for <strong style={{color:T.ink}}>{me.neighborhood}</strong>.</p>
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><div style={{...sans,fontSize:14,fontWeight:600,color:T.ink}}>Waitlist</div><span style={S.tag}>Waiting</span></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div><div style={{...sans,fontSize:11,color:T.faint,marginBottom:4}}>In area</div><div style={{...sans,fontSize:28,fontWeight:600,color:T.ink}}>{hoodWait.length+1}</div></div>
          <div><div style={{...sans,fontSize:11,color:T.faint,marginBottom:4}}>Need</div><div style={{...sans,fontSize:28,fontWeight:600,color:T.ink}}>2</div></div>
        </div>
        <div style={{marginTop:14,...sans,fontSize:13,color:T.muted}}>{hoodWait.length+1>=2?"Enough people — try refreshing.":"Share with friends nearby."}</div>
      </div>
      <hr className="div"/>
      <div style={{display:"flex",gap:10}}><button style={{...S.btnO,flex:1}} onClick={share}>Share</button><button style={{...S.btn,flex:1}} onClick={refresh}>Check matches</button></div>
    </>}
    <Nav/>
  </div>}

  {/* ═══ CIRCLE ═══ */}
  {scr==="circle"&&me&&mc&&<div style={S.page}>
    <div style={S.sTag}>Cohort {mc.name} {mc.number}</div>
    <div style={{display:"flex",gap:0,marginBottom:24,borderBottom:`1.5px solid ${T.borderL}`,overflowX:"auto"}}>
      {[["members","Members"],["feed","Feed"],["memories","Memories"],["schedule","Schedule"],["health","Health"]].map(([k,l])=><button key={k} style={{...sans,fontSize:13,fontWeight:tab===k?600:400,color:tab===k?T.green:T.faint,borderBottom:tab===k?`2px solid ${T.green}`:"2px solid transparent",padding:"10px 16px",marginBottom:-1.5,whiteSpace:"nowrap"}} onClick={()=>setTab(k)}>{l}</button>)}
    </div>

    {tab==="members"&&<div>{[me,...members].map((m,i)=>{const isMe=m.id===me.id;const h=isMe?155:((m.name||"").charCodeAt(0)*47+120)%360;const sh=isMe?[]:(m.interests||[]).filter(x=>(me.interests||[]).includes(x));const exp=openMem===i;
      return<div key={m.id} style={{...S.card,cursor:isMe?"default":"pointer"}} className="card" onClick={isMe?undefined:()=>setOpenMem(exp?null:i)}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{...S.av(h),...(isMe?{background:T.greenP,color:T.green}:{})}}>{(m.name||"?")[0].toUpperCase()}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{...sans,fontSize:14,fontWeight:500,color:T.ink}}>{m.name}{isMe&&<span style={{fontWeight:400,color:T.faint,fontSize:12}}> you</span>}{!isMe&&m.age&&<span style={{fontWeight:400,color:T.faint,fontSize:12}}>, {m.age}</span>}{sh.length>=2&&<span style={{...S.tag,marginLeft:8}}>{sh.length} shared</span>}</div>
            <div style={{...sans,fontSize:12.5,color:T.muted,lineHeight:1.5}}>{m.bio||(m.interests||[]).join(" · ")}</div>
            {m.vibe&&<div style={{...sans,fontSize:11,color:T.green,marginTop:3}}>{m.vibe}</div>}
            <BadgeRow ids={m.badges}/>
            {(trustLevel>=2||isMe)&&(m.instagram||m.beli)&&<div style={{display:"flex",gap:12,marginTop:6}}>{m.instagram&&<a href={`https://instagram.com/${m.instagram.replace("@","")}`} target="_blank" rel="noopener" style={{...sans,fontSize:11}} onClick={e=>e.stopPropagation()}>Instagram</a>}{m.beli&&<a href={`https://bfrnd.link/${m.beli}`} target="_blank" rel="noopener" style={{...sans,fontSize:11}} onClick={e=>e.stopPropagation()}>Beli</a>}</div>}
          </div>
        </div>
        {exp&&!isMe&&<div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${T.borderL}`,animation:"fadeIn .3s ease"}}>
          {m.life_stage&&<div style={{...sans,fontSize:12,color:T.green,marginBottom:6}}>{LIFE_STAGES.find(ls=>ls.id===m.life_stage)?.icon} {LIFE_STAGES.find(ls=>ls.id===m.life_stage)?.label}</div>}
          {m.intention&&<div style={{...sans,fontSize:12,color:T.muted,marginBottom:10}}>Looking for: {INTENTIONS.find(it=>it.id===m.intention)?.label}</div>}
          {(m.prompts||[]).filter(p=>p.a).map((p,j)=><div key={j} style={{marginBottom:12}}><div style={{...sans,fontSize:11,color:T.faint,marginBottom:3}}>{p.q}</div><div style={{...sans,fontSize:13,color:T.text,lineHeight:1.6}}>{p.a}</div></div>)}

    {tab==="schedule"&&season&&<div>

        <button style={{...S.btnSm,border:`1.5px solid ${T.brown}`,color:T.brown}} onClick={()=>{setShowRitForm(!showRitForm);setShowEvForm(false);}}>{showRitForm?"Cancel":"+ Ritual"}</button>

    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>{BADGES.map(b=><button key={b.id} className="chip-btn" style={S.chip(form.badges.includes(b.id))} onClick={()=>togArr("badges",b.id)}>{b.i} {b.l}</button>)}</div>
    <label style={S.label}>Vibe</label>
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>{VIBES.map(v=><button key={v} className="chip-btn" style={S.chip(form.vibe===v)} onClick={()=>sF("vibe",form.vibe===v?"":v)}>{v}</button>)}</div>
    <hr className="div"/>
    <div style={{marginBottom:20}}><label style={S.label}>Instagram</label><input style={S.input} value={form.instagram} onChange={e=>sF("instagram",e.target.value)}/></div>
    <div style={{marginBottom:24}}><label style={S.label}>Beli</label><input style={S.input} value={form.beli} onChange={e=>sF("beli",e.target.value)}/></div>
    <button style={{...S.btn,...(saving?S.dis:{})}} onClick={updateProfile}>{saving?"Saving...":"Save"}</button>
    <hr className="div"/>
    <button style={{...sans,fontSize:13,color:T.red,width:"100%",textAlign:"center",padding:14}} onClick={logout}>Log out</button>
    <div style={{textAlign:"center",marginTop:10}}><button style={{...sans,fontSize:13,color:T.faint}} onClick={()=>go("home")}>Back</button></div>
    <Nav/>
  </div>}

  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
