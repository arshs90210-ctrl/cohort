function genSeason(nk){const s=new Date(2026,3,20);const dm={Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};while(s.getDay()!==dm[nk])s.setDate(s.getDate()+1);return Array.from({length:8},(_,i)=>{const d=new Date(s);d.setDate(d.getDate()+i*7);return{week:i+1,date:d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}),short:d.toLocaleDateString("en-US",{month:"short",day:"numeric"}),past:d<new Date()};});}
function runMatch(users,cohorts){const matched=new Set(cohorts.flatMap(c=>c.member_ids||[]));const free=users.filter(u=>!matched.has(u.id)&&u.neighborhood&&u.nights?.length);const groups={};free.forEach(u=>u.nights.forEach(n=>{const k=`${u.neighborhood}::${n}`;if(!groups[k])groups[k]=[];groups[k].push(u);}));const res=[],used=new Set();Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).forEach(([k,us])=>{const av=us.filter(u=>!used.has(u.id));if(av.length>=2){const[h,n]=k.split("::");const take=av.slice(0,12);take.forEach(u=>used.add(u.id));const vl=VENUES[h]||VENUES["Upper East Side"];const fc=take.filter(u=>u.cost_pref==="free").length;const pool=fc>take.length/2?vl.filter(v=>v.type==="park"):vl;const v=(pool.length?pool:vl)[Math.floor(Math.random()*(pool.length||vl.length))];res.push({id:`c-${uid()}`,name:CNAMES[(cohorts.length+res.length)%CNAMES.length],number:`#${100+cohorts.length+res.length}`,hood:h,night:n,venue:v,member_ids:take.map(u=>u.id),activity:INTERESTS.find(int=>take.filter(u=>(u.interests||[]).includes(int)).length>=2)||"Gathering",season:1,host_id:take[0]?.id||"",created_at:new Date().toISOString()});}});return res;}

  const today=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

  return(

  {/* ═══ LANDING — Full-screen opening statement ═══ */}

    {/* Top bar */}

      <div style={{display:"flex",alignItems:"center",gap:12}}><Mark size={22}/><span style={{...mono,fontSize:11,letterSpacing:"3px",textTransform:"uppercase",color:C.muted}}>Cohort</span></div>

        <p style={{...s.p,maxWidth:400,animation:"enter .7s ease .25s both"}}>

      <button style={{color:C.muted}} onClick={()=>go("explore")}>Neighborhoods</button>

  </div>}

  {/* ═══ ABOUT ═══ */}
  {scr==="about"&&<div style={s.page}>
    <div style={s.tag} className="enter">About</div>
    <h2 style={{...s.h2,marginBottom:20}} className="enter">Community used to be the default.</h2>
    <div style={{...s.p,marginBottom:16}}>You made friends through repeated contact with the same people in the same places. That infrastructure is gone.</div>
    <div style={{...s.p,marginBottom:16}}>Cohort manufactures the conditions where strangers become familiar, familiar people become reliable, and reliable people become each other's community.</div>
    <div style={{...s.p,marginBottom:16}}>This is not a matching app. Not a nightlife tool. Not networking with better branding. We give you a small group, a night, and a place. Then we get out of the way.</div>
    <div style={s.hr}/><button style={s.btn} onClick={()=>go(me?"home":"signup")}>{me?"Back":"Enter"}</button>
    <div style={{textAlign:"center",marginTop:16}}><button style={{...s.small,color:C.muted}} onClick={()=>go("landing")}>Back</button></div>
  </div>}

  {/* ═══ SAFETY ═══ */}

      <button style={{...s.btn,...(!form.name||!form.age||form.age<21||form.age>34||!form.neighborhood?s.dis:{})}} onClick={()=>setStep(1)}>Continue</button>

      {/* ═══ THE CIRCLE LEDGER ═══ */}

        </div>
        {posts.slice(0,3).map(p=><div key={p.id} style={{marginBottom:12}}>
          <div style={{...mono,fontSize:10,color:C.muted}}>{p.user_name} · {ago(p.created_at)}</div>
          <div style={{fontSize:14,color:C.body,lineHeight:1.6,marginTop:2}}>{p.content}</div>
        </div>)}
      </div>}

      {/* Open asks */}
      {asks.filter(a=>!a.resolved).length>0&&<div style={{borderBottom:`1px solid ${C.line}`,padding:"20px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <span style={{...mono,fontSize:10,color:C.muted,letterSpacing:"2px",textTransform:"uppercase"}}>Open asks</span>
          <button style={{fontSize:11,color:C.greenL}} onClick={()=>go("ask")}>All</button>
        </div>
        {asks.filter(a=>!a.resolved).slice(0,2).map(a=><div key={a.id} style={{marginBottom:12}}>
          <div style={{...mono,fontSize:10,color:a.ask_type==="need"?C.brass:C.green}}>{a.ask_type==="need"?"NEEDS":"OFFERING"} · {a.user_name}</div>
          <div style={{fontSize:14,color:C.body,marginTop:2}}>{a.content}</div>
        </div>)}
      </div>}

      {/* Stats — minimal, not dashboard */}
      <div style={{display:"flex",borderBottom:`1px solid ${C.line}`}}>
        {[{l:"Season",v:mc.season||1},{l:"Your rate",v:Math.round(myR.size/Math.max(1,season?.filter(w=>w.past).length||1)*100)+"%"},{l:"Memories",v:memos.length}].map((x,i)=><div key={i} style={{flex:1,padding:"16px 0",textAlign:"center",borderRight:i<2?`1px solid ${C.line}`:"none"}}><div style={{...mono,fontSize:9,color:C.muted,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:4}}>{x.l}</div><div style={{...display,fontSize:20,color:C.bright}}>{x.v}</div></div>)}
      </div>

      <div style={{display:"flex",gap:1,marginTop:1}}><button style={{...s.btnO,flex:1}} onClick={share}>Invite</button><button style={{...s.btnO,flex:1}} onClick={()=>go("explore")}>Explore</button></div>

    </>:<>
      {/* ─── WAITLIST ─── */}
      <div className="enter">
        <h2 style={{...s.h2,marginBottom:8}}>Welcome, {me.name}.</h2>
        <p style={{...s.p,marginBottom:28}}>You're on the list for {me.neighborhood}. Circles form when 2+ people share a neighborhood and a night.</p>
        <div style={{...s.panel}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><div style={{...mono,fontSize:10,color:C.muted,letterSpacing:"1.5px",textTransform:"uppercase"}}>In your area</div><div style={{...display,fontSize:28,color:C.bright,marginTop:4}}>{hoodWait.length+1}</div></div>
            <div style={{textAlign:"right"}}><div style={{...mono,fontSize:10,color:C.muted,letterSpacing:"1.5px",textTransform:"uppercase"}}>Need</div><div style={{...display,fontSize:28,color:C.bright,marginTop:4}}>2</div></div>
          </div>
        </div>
        <div style={s.hr}/>
        <div style={{display:"flex",gap:1}}><button style={{...s.btnO,flex:1}} onClick={share}>Share link</button><button style={{...s.btn,flex:1}} onClick={refresh}>Check</button></div>
      </div>
    </>}
    <Nav/>
  </div>}

  {/* ═══ CIRCLE — Feed + Memories ═══ */}
  {scr==="circle"&&me&&mc&&<div style={s.page}>
    <div style={s.tag}>Circle {mc.name}</div>
    <div style={{display:"flex",borderBottom:`1px solid ${C.line}`,marginBottom:24}}>
      {[["feed","Feed"],["memories","Memories"]].map(([k,l])=><button key={k} style={{...s.itoggle(tab===k),flex:1,textAlign:"center"}} onClick={()=>setTab(k)}>{l}</button>)}
    </div>

    {tab==="feed"&&<div>
      <div style={{marginBottom:24}}><textarea style={{minHeight:56,marginBottom:8}} value={newPost} onChange={e=>setNewPost(e.target.value)} placeholder="Share with your circle..."/><div style={{display:"flex",justifyContent:"flex-end"}}><button style={{...s.smG,...(!newPost.trim()?s.dis:{})}} onClick={doPost}>Post</button></div></div>
      {posts.map(p=><div key={p.id} style={{borderBottom:`1px solid ${C.line}`,padding:"16px 0"}}><div style={{...mono,fontSize:10,color:C.muted}}>{p.user_name}{p.user_id===me.id?" (you)":""} · {ago(p.created_at)}</div><div style={{fontSize:14,color:C.body,lineHeight:1.65,marginTop:4,whiteSpace:"pre-wrap"}}>{p.content}</div></div>)}
      {posts.length===0&&<div style={{padding:40,textAlign:"center",color:C.muted}}>Nothing yet.</div>}
    </div>}

    {tab==="memories"&&<div>
      <div style={{marginBottom:24}}><textarea style={{minHeight:56,marginBottom:8}} value={memInput} onChange={e=>setMemInput(e.target.value)} placeholder="A quote, a moment, an inside joke..."/><div style={{display:"flex",justifyContent:"flex-end"}}><button style={{...s.sm,borderColor:C.brass,color:C.brass,...(!memInput.trim()?s.dis:{})}} onClick={doMem}>Save memory</button></div></div>
      {memos.map(m=><div key={m.id} style={{borderLeft:`2px solid ${C.brass}`,paddingLeft:16,marginBottom:20}}>
        <div style={{...mono,fontSize:10,color:C.muted}}>Week {m.week} · {m.user_name}</div>
        <div style={{...display,fontSize:15,fontStyle:"italic",color:C.body,lineHeight:1.6,marginTop:4}}>{m.content}</div>
      </div>)}
      {memos.length===0&&<div style={{padding:40,textAlign:"center",color:C.muted}}>No memories yet. After your first night, capture what mattered.</div>}
    </div>}
    <Nav/>
  </div>}

  {/* ═══ RITUALS ═══ */}
  {scr==="ritual"&&me&&mc&&<div style={s.page}>
    <div style={s.tag}>Rituals</div>
    <h2 style={{...s.h2,marginBottom:24}}>The 8-week progression</h2>
    {RITUALS.map((r,i)=>{const done=season&&season[i]?.past;const current=cw?.week===r.w;
      return<div key={i} style={{borderBottom:`1px solid ${C.line}`,padding:"20px 0",opacity:done&&!current?.5:1}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{...mono,fontSize:10,color:current?C.green:C.muted,letterSpacing:"2px"}}>{String(r.w).padStart(2,"0")} · {r.t}{current?" — THIS WEEK":""}</div>
            <div style={{...display,fontSize:15,color:C.body,lineHeight:1.6,marginTop:6,fontStyle:"italic"}}>{r.p}</div>
          </div>
          {season&&!season[i]?.past&&<button style={myR.has(r.w)?s.smG:s.sm} onClick={()=>doRsvp(r.w)}>{myR.has(r.w)?"Going":"RSVP"}</button>}
        </div>
      </div>;
    })}
    <Nav/>
  </div>}

  {/* ═══ ASK / OFFER ═══ */}
  {scr==="ask"&&me&&mc&&<div style={s.page}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
      <div><div style={s.tag}>Ask & offer</div><div style={{...display,fontSize:20,color:C.bright}}>Mutual aid</div></div>
      <button style={s.smG} onClick={()=>setShowAsk(!showAsk)}>{showAsk?"Cancel":"+ New"}</button>
    </div>

    {showAsk&&<div style={{borderTop:`1px solid ${C.line}`,borderBottom:`1px solid ${C.line}`,padding:"20px 0",marginBottom:20,animation:"fadeIn .2s ease"}}>
      <div style={{display:"flex",marginBottom:16}}>
        <button style={{...s.itoggle(askForm.ask_type==="need"),flex:1,textAlign:"center"}} onClick={()=>setAskForm(f=>({...f,ask_type:"need"}))}>I need...</button>
        <button style={{...s.itoggle(askForm.ask_type==="offer"),flex:1,textAlign:"center"}} onClick={()=>setAskForm(f=>({...f,ask_type:"offer"}))}>I can help...</button>
      </div>
      <select style={{marginBottom:12}} value={askForm.category} onChange={e=>setAskForm(f=>({...f,category:e.target.value}))}>{ASK_CATS.map(c=><option key={c} value={c}>{c}</option>)}</select>
      <textarea style={{minHeight:64,marginBottom:12}} value={askForm.content} onChange={e=>setAskForm(f=>({...f,content:e.target.value}))} placeholder={askForm.ask_type==="need"?"What do you need?":"What can you offer?"}/>
      <button style={{...s.btn,...(!askForm.content.trim()?s.dis:{})}} onClick={doAsk}>Post</button>
    </div>}

    {asks.filter(a=>!a.resolved).map(a=><div key={a.id} style={{borderBottom:`1px solid ${C.line}`,padding:"16px 0"}}>
      <div style={{...mono,fontSize:10,color:a.ask_type==="need"?C.brass:C.green,letterSpacing:"1.5px"}}>{a.ask_type==="need"?"NEEDS":"OFFERING"} · {a.category} · {a.user_name} · {ago(a.created_at)}</div>
      <div style={{fontSize:14,color:C.body,lineHeight:1.5,marginTop:4}}>{a.content}</div>
    </div>)}

    {asks.length===0&&!showAsk&&<div style={{padding:40,textAlign:"center",color:C.muted}}>Nothing yet. "Need a gym buddy." "Can help with resumes."</div>}
    <Nav/>
  </div>}

  {/* ═══ GRADUATION ═══ */}
  {scr==="graduation"&&me&&mc&&<div style={s.page}>
    <div style={s.tag}>Season complete</div>
    <h2 style={{...s.h2,marginBottom:24}}>What continues</h2>
    {GRAD.map((g,i)=><button key={g.id} style={{...s.panel,display:"block",width:"100%",textAlign:"left",animation:`enter .4s ease ${i*.08}s both`}} onClick={()=>flash("Coming soon: "+g.l)}>
      <div style={{fontSize:15,fontWeight:500,color:C.bright,marginBottom:4}}>{g.l}</div>
      <div style={{fontSize:13,color:C.muted}}>{g.d}</div>
    </button>)}
    <div style={s.hr}/><button style={s.btnO} onClick={()=>go("home")}>Back</button><Nav/>
  </div>}

  {/* ═══ PROFILE ═══ */}
  {scr==="profile"&&me&&<div style={s.page}>
    <div style={s.tag}>Profile</div>
    <div style={{marginBottom:16}}><div style={{...s.small,marginBottom:8,textTransform:"uppercase",letterSpacing:"1.5px"}}>Name</div><input value={form.name} onChange={e=>sF("name",e.target.value)}/></div>
    <div style={{marginBottom:16}}><div style={{...s.small,marginBottom:8,textTransform:"uppercase",letterSpacing:"1.5px"}}>Neighborhood</div><div style={{fontSize:14,color:C.muted,padding:"14px 0"}}>{me.neighborhood}</div></div>
    <div style={{marginBottom:16}}><div style={{...s.small,marginBottom:8,textTransform:"uppercase",letterSpacing:"1.5px"}}>Bio</div><textarea style={{minHeight:72}} value={form.bio} onChange={e=>sF("bio",e.target.value)}/></div>
    <div style={{marginBottom:16}}><div style={{...s.small,marginBottom:8,textTransform:"uppercase",letterSpacing:"1.5px"}}>Interests</div>
    <div style={{display:"flex",flexWrap:"wrap"}}>{INTERESTS.map(x=><button key={x} style={{...s.itoggle(form.interests.includes(x)),padding:"8px 12px"}} onClick={()=>tog("interests",x,5)}>{x}</button>)}</div></div>
    <div style={{marginBottom:16}}><div style={{...s.small,marginBottom:8,textTransform:"uppercase",letterSpacing:"1.5px"}}>Nights</div>
    <div style={{display:"flex"}}>{NIGHTS.map(x=><button key={x} style={{...s.itoggle(form.nights.includes(x)),flex:1,textAlign:"center"}} onClick={()=>tog("nights",x)}>{x}</button>)}</div></div>
    <div style={s.hr}/>
    <div style={{display:"flex",gap:12,marginBottom:16}}><div style={{flex:1}}><div style={{...s.small,marginBottom:8,textTransform:"uppercase",letterSpacing:"1.5px"}}>Instagram</div><input value={form.instagram} onChange={e=>sF("instagram",e.target.value)}/></div><div style={{flex:1}}><div style={{...s.small,marginBottom:8,textTransform:"uppercase",letterSpacing:"1.5px"}}>Beli</div><input value={form.beli} onChange={e=>sF("beli",e.target.value)}/></div></div>
    <button style={{...s.btn,...(saving?s.dis:{})}} onClick={async()=>{setSaving(true);const u={...me,name:form.name.trim()||me.name,bio:form.bio.trim(),interests:form.interests.length?form.interests:me.interests,nights:form.nights.length?form.nights:me.nights,instagram:form.instagram.trim(),beli:form.beli.trim()};await DB.put("users",u);DB.setMid(u.id);setMe(u);flash("Saved.");setSaving(false);go("home");}}>{saving?"Saving...":"Save"}</button>
    <div style={s.hr}/><button style={{fontSize:13,color:C.wine,width:"100%",textAlign:"center",padding:14}} onClick={logout}>Log out</button>
    <div style={{textAlign:"center",marginTop:10}}><button style={{fontSize:13,color:C.muted}} onClick={()=>go("home")}>Back</button></div>
    <Nav/>
  </div>}

  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
