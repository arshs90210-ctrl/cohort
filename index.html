const ago = (d) => {
  if (!d) return "";
  const m = Math.floor((Date.now() - new Date(d).getTime()) / 60000);
  if (m < 1) return "just now";
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const days = Math.floor(h / 24);
  if (days < 7) return `${days}d ago`;
  return `${Math.floor(days / 7)}w ago`;
};

function genSeason(nk) {
  const s = new Date(2026, 3, 20);
  const dm = { Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6 };
  while (s.getDay() !== dm[nk]) s.setDate(s.getDate() + 1);
  return Array.from({ length: 8 }, (_, i) => {
    const d = new Date(s);
    d.setDate(d.getDate() + i * 7);
    return {
      week: i + 1,
      date: d.toLocaleDateString("en-US", { month:"long", day:"numeric" }),
      short: d.toLocaleDateString("en-US", { month:"short", day:"numeric" }),
      past: d < new Date(),
    };
  });
}

function runMatch(users, cohorts) {
  const matched = new Set(cohorts.flatMap(c => c.member_ids || []));
  const free = users.filter(u =>
    !matched.has(u.id) && u.neighborhood && u.nights?.length
  );

  const groups = {};
  free.forEach(u => {
    u.nights.forEach(n => {
      const k = `${u.neighborhood}::${n}`;
      if (!groups[k]) groups[k] = [];
      groups[k].push(u);
    });
  });

  const res = [];
  const used = new Set();

  Object.entries(groups)
    .sort((a, b) => b[1].length - a[1].length)
    .forEach(([k, us]) => {
      const av = us.filter(u => !used.has(u.id));
      if (av.length >= 2) {
        const [h, n] = k.split("::");
        const take = av.slice(0, Math.min(12, av.length));
        take.forEach(u => used.add(u.id));

        const vl = VENUES[h] || VENUES["Upper East Side"];
        // Prefer parks for free-preference groups
        const freeCount = take.filter(u => u.cost_pref === "free").length;
        const pool = freeCount > take.length / 2
          ? vl.filter(v => v.type === "park") : vl;
        const v = (pool.length ? pool : vl)[Math.floor(Math.random() * (pool.length || vl.length))];

        const nm = CNAMES[(cohorts.length + res.length) % CNAMES.length];
        const shared = INTERESTS.filter(int =>
          take.filter(u => (u.interests || []).includes(int)).length >= 2
        );

        res.push({
          id: `c-${uid()}`,
          name: nm,
          number: `#${100 + cohorts.length + res.length}`,
          hood: h,
          night: n,
          venue: v,
          member_ids: take.map(u => u.id),
          activity: shared[0] || "Hanging out",
          season: 1,
          host_id: take[0]?.id || "",
          created_at: new Date().toISOString(),
        });
      }
    });

  return res;
}


// ═══════════════════════════════════════════════════════════════
// DATABASE LAYER
// ═══════════════════════════════════════════════════════════════
const DB = {
  async get(table, query) {
    if (sb) {
      let q = sb.from(table).select("*");
      if (query) Object.entries(query).forEach(([k, v]) => { q = q.eq(k, v); });
      const { data } = await q.order("created_at", { ascending: false });
      return data || [];
    }
    try {
      const all = JSON.parse(localStorage.getItem(`co_${table}`) || "[]");
      if (query) return all.filter(x =>
        Object.entries(query).every(([k, v]) => x[k] === v)
      );
      return all;
    } catch { return []; }
  },

  async put(table, doc) {
    if (sb) {
      await sb.from(table).upsert(doc, { onConflict:"id" });
    } else {
      const all = await this.get(table);
      const i = all.findIndex(x => x.id === doc.id);
      if (i >= 0) all[i] = doc; else all.push(doc);
      localStorage.setItem(`co_${table}`, JSON.stringify(all));
    }
  },

  async add(table, doc) {
    if (sb) {
      await sb.from(table).insert(doc);
    } else {
      const all = await this.get(table);
      all.unshift(doc);
      localStorage.setItem(`co_${table}`, JSON.stringify(all));
    }
  },

  async del(table, query) {
    if (sb) {
      let q = sb.from(table).delete();
      Object.entries(query).forEach(([k, v]) => { q = q.eq(k, v); });
      await q;
    } else {
      const all = await this.get(table);
      const filtered = all.filter(x =>
        !Object.entries(query).every(([k, v]) => x[k] === v)
      );
      localStorage.setItem(`co_${table}`, JSON.stringify(filtered));
    }
  },

  async toggleRsvp(userId, cohortId, week) {
    const key = `${userId}-${cohortId}-${week}`;
    const ex = await this.get("rsvps", { user_id: userId, cohort_id: cohortId, week });
    if (ex.length) {
      await this.del("rsvps", { user_id: userId, cohort_id: cohortId, week });
      return false;
    } else {
      await this.add("rsvps", {
        id: key, user_id: userId, cohort_id: cohortId,
        week, status:"going", created_at: new Date().toISOString()
      });
      return true;
    }
  },

  mid()      { return localStorage.getItem("co-me"); },
  setMid(id) { localStorage.setItem("co-me", id); },
  clearMid() { localStorage.removeItem("co-me"); },
};

      {/* ═══════════════════════════════════════════════════════

            <div key={i} style={{ marginBottom: 14 }}>
              <select style={{ ...S.input, fontSize: 13, marginBottom: 8 }} value={p.q}
                onChange={e => { const pr = [...form.prompts]; pr[i] = { ...pr[i], q: e.target.value }; sF("prompts", pr); }}>
                {PROMPTS.map(q => <option key={q} value={q}>{q}</option>)}
              </select>
              <textarea style={{ ...S.input, minHeight: 56 }} value={p.a}
                onChange={e => { const pr = [...form.prompts]; pr[i] = { ...pr[i], a: e.target.value }; sF("prompts", pr); }} />
            </div>
          ))}
          <button style={{ ...sans, fontSize: 12, color: T.green, marginBottom: 16 }}
            onClick={() => sF("prompts", [...form.prompts, { q: PROMPTS[Math.floor(Math.random() * PROMPTS.length)], a:"" }])}>
            + Add prompt
          </button>

          <hr className="div" />

          <label style={S.label}>Badges ({form.badges.length}/5)</label>
          <div style={{ display:"flex", flexWrap:"wrap", gap: 8, marginBottom: 20 }}>
            {BADGES.map(b => <button key={b.id} className="chip-btn" style={S.chip(form.badges.includes(b.id))} onClick={() => togArr("badges", b.id)}>{b.i} {b.l}</button>)}
          </div>

          <label style={S.label}>Vibe</label>
          <div style={{ display:"flex", flexWrap:"wrap", gap: 8, marginBottom: 20 }}>
            {VIBES.map(v => <button key={v} className="chip-btn" style={S.chip(form.vibe === v)} onClick={() => sF("vibe", form.vibe === v ? "" : v)}>{v}</button>)}
          </div>

          <hr className="div" />

          <div style={{ marginBottom: 20 }}><label style={S.label}>Instagram</label><input style={S.input} value={form.instagram} onChange={e => sF("instagram", e.target.value)} /></div>
          <div style={{ marginBottom: 24 }}><label style={S.label}>Beli</label><input style={S.input} value={form.beli} onChange={e => sF("beli", e.target.value)} /></div>

          <button style={{ ...S.btn, ...(saving ? S.dis : {}) }} onClick={updateProfile}>
            {saving ? "Saving..." : "Save changes"}
          </button>

          <hr className="div" />

          <button style={{ ...sans, fontSize: 13, color: T.red, width: "100%", textAlign: "center", padding: 14 }} onClick={logout}>
            Log out
          </button>
          <div style={{ textAlign:"center", marginTop: 10 }}>
            <button style={{ ...sans, fontSize: 13, color: T.faint }} onClick={() => go("home")}>Back</button>
          </div>

          <Nav />
        </div>
      )}

    </div>
  );
}


// ═══════════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
